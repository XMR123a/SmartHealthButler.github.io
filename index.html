<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能健康管家 - AI健康管理平台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; }
        
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            padding: 15px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 20px rgba(0,0,0,0.08);
            z-index: 1000;
        }
        
        .logo { font-size: 24px; font-weight: 800; color: #3b82f6; }
        .nav-links { display: flex; gap: 30px; }
        .nav-links a { text-decoration: none; color: #666; font-size: 15px; transition: color 0.3s; }
        .nav-links a:hover { color: #3b82f6; }
        
        .hero {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding-top: 80px;
            color: white;
        }
        
        .hero h1 { font-size: 50px; margin-bottom: 20px; }
        .hero p { font-size: 20px; margin-bottom: 40px; opacity: 0.9; }
        .hero button {
            padding: 15px 40px;
            font-size: 18px;
            background: white;
            border: none;
            border-radius: 50px;
            color: #667eea;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .hero button:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        
        .features { padding: 80px 50px; background: #f8fafc; }
        .features h2 { text-align: center; font-size: 36px; margin-bottom: 60px; color: #1e293b; }
        .feature-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 30px; }
        .feature-card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            text-align: center;
            transition: transform 0.3s;
        }
        .feature-card:hover { transform: translateY(-8px); }
        .feature-card i { font-size: 40px; margin-bottom: 15px; }
        .feature-card h3 { font-size: 20px; margin-bottom: 10px; color: #1e293b; }
        .feature-card p { font-size: 14px; color: #64748b; }

        .about-content { display: flex; align-items: center; gap: 50px; }
        .about-text { flex: 1; }
